version: 1
suite: OT_Utilities

modules:
  - OT_Utilities

module_paths:
  - ../ctl

defaults:
  tolerance:
    abs: 1.0e-6

tests:
  - id: clamp_below
    function: OT_Utilities::clamp_f
    inputs: { x: -2.5, lo: 0.0, hi: 1.0 }
    oracle:
      inline: { return: 0.0 }

  - id: clamp_above
    function: OT_Utilities::clamp_f
    inputs: { x: 2.5, lo: 0.0, hi: 1.0 }
    oracle:
      inline: { return: 1.0 }

  - id: clamp_inside
    function: OT_Utilities::clamp_f
    inputs: { x: 0.42, lo: 0.0, hi: 1.0 }
    oracle:
      inline: { return: 0.42 }

  - id: lerp_endpoint_t0
    function: OT_Utilities::lerp_f
    inputs: { a: 1.0, b: 5.0, t: 0.0 }
    tolerance: { abs: 0.0 }
    oracle:
      inline: { return: 1.0 }

  - id: lerp_endpoint_t1
    function: OT_Utilities::lerp_f
    inputs: { a: 1.0, b: 5.0, t: 1.0 }
    tolerance: { abs: 0.0 }
    oracle:
      inline: { return: 5.0 }

  - id: lerp_third_ulp
    description: t = 1/3 nearest-FP32; verifies ulp tolerance handling.
    function: OT_Utilities::lerp_f
    inputs: { a: 0.0, b: 1.0, t: 0.3333333432674408 }
    tolerance: { ulp: 1 }
    oracle:
      inline: { return: 0.3333333432674408 }

  - id: log2_below_floor
    description: Negative input is floored to floor_pos before log2.
    function: OT_Utilities::safe_log2
    inputs: { x: -1.0, floor_pos: 0.0009765625 }    # 2^-10
    tolerance: { abs: 1.0e-5 }
    oracle:
      inline: { return: -10.0 }

  - id: log2_relative_tol
    function: OT_Utilities::safe_log2
    inputs: { x: 1024.0, floor_pos: 1.0e-10 }
    tolerance: { rel: 1.0e-6 }
    oracle:
      inline: { return: 10.0 }

  - id: pow_negative_base_returns_zero
    function: OT_Utilities::safe_pow
    inputs: { base: -2.0, exponent: 0.5 }
    oracle:
      inline: { return: 0.0 }

  - id: pow_normal
    function: OT_Utilities::safe_pow
    inputs: { base: 2.0, exponent: 10.0 }
    tolerance: { rel: 1.0e-6 }
    oracle:
      inline: { return: 1024.0 }
